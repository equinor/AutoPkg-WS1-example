Comment: |
  recipe with ws1_assignments for AppsV2 API style assignment-rules
  See https://as135.awmdm.com/API/help/Docs/Explore?urls.primaryName=MAM%20API%20V2#/AppsV2/AppsV2_GetAssignmentRuleAsync
Description: rules to make assignments for the software title
Identifier: local.ws1-assigner.Firefox
Input:
  NAME: Mozilla Firefox
  WS1_API_PASSWORD: none
  WS1_API_TOKEN: none
  WS1_API_URL: none
  WS1_API_USERNAME: none
  WS1_B64ENCODED_API_CREDENTIALS: none
  WS1_CONSOLE_URL: none
  WS1_GROUPID: none
  WS1_OAUTH_CLIENT_ID: none
  WS1_OAUTH_CLIENT_SECRET: none
  WS1_OAUTH_TOKEN_URL: none
  ws1_app_assignments:
  - distribution:
      app_delivery_method: ON_DEMAND
      description: |
        Testing
          macOS-SW-TESTING
      display_in_app_catalog: true
      distr_delay_days: '0'
      is_default_assignment: false
      keep_app_updated_automatically: true
      name: TESTING
      smart_group_names:
      - macOS-SW-TESTING
    restriction:
      desired_state_management: false
      managed_access: false
      prevent_removal: false
      remove_on_unenroll: false
  - distribution:
      app_delivery_method: ON_DEMAND
      description: |
        Early Access for new software versions
          macOS-SW-EARLY_ACCESS
      display_in_app_catalog: true
      distr_delay_days: '3'
      is_default_assignment: false
      keep_app_updated_automatically: true
      name: QA
      smart_group_names:
      - macOS-SW-EARLY_ACCESS
    restriction:
      desired_state_management: false
      managed_access: false
      prevent_removal: false
      remove_on_unenroll: false
  - distribution:
      app_delivery_method: ON_DEMAND
      description: On-Demand for macOS_MgtType-FULL
      display_in_app_catalog: true
      distr_delay_days: '14'
      is_default_assignment: false
      keep_app_updated_automatically: true
      name: PROD
      smart_group_names:
      - macOS_MgtType-FULL
ParentRecipe: com.github.codeskipper.ws1-assigner.MozillaFirefox
